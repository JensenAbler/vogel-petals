<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Radial Petal Modulation v5</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Playfair+Display:wght@400;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-deep: #0a0a12;
            --bg-surface: #12121f;
            --text-primary: #e8e4dc;
            --text-muted: #7a7880;
            --accent-blue: #1a3a5c;
            --accent-yellow: #f4d03f;
            --accent-green: #4ade80;
            --accent-purple: #a855f7;
            --accent-cyan: #22d3ee;
            --accent-orange: #fb923c;
            --glow-blue: rgba(30, 90, 150, 0.4);
            --glow-yellow: rgba(244, 208, 63, 0.3);
        }

        body.bw-scheme {
            --bg-deep: #ffffff;
            --bg-surface: #ffffff;
            --text-primary: #050505;
            --text-muted: #383838;
            --accent-blue: #222222;
            --accent-yellow: #050505;
            --accent-green: #111111;
            --accent-purple: #2b2b2b;
            --accent-cyan: #050505;
            --accent-orange: #4f4f4f;
            --glow-blue: rgba(0, 0, 0, 0);
            --glow-yellow: rgba(0, 0, 0, 0);
        }
        
        html, body {
            height: 100%;
            overflow: hidden;
            touch-action: none;
        }
        
        body {
            background: var(--bg-deep);
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: ew-resize;
            user-select: none;
            -webkit-user-select: none;
        }
        
        h1 {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            letter-spacing: 0.08em;
            margin-bottom: 0.2rem;
            text-align: center;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-yellow) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            pointer-events: none;
        }
        
        .subtitle {
            font-size: 0.5rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.3em;
            margin-bottom: 0.5rem;
            pointer-events: none;
        }
        
        .canvas-container {
            position: relative;
            width: min(50vw, 45vh, 320px);
            height: min(50vw, 45vh, 320px);
            margin-bottom: 0.6rem;
        }
        
        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(ellipse at center, var(--bg-surface) 0%, var(--bg-deep) 70%);
            box-shadow: 
                0 0 40px var(--glow-blue),
                inset 0 0 60px rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }
        
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            pointer-events: none;
        }
        
        .value-display {
            font-size: clamp(1.4rem, 5vw, 2.2rem);
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            background: linear-gradient(90deg, var(--accent-blue) 0%, var(--accent-yellow) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px var(--glow-yellow);
            pointer-events: none;
        }
        
        .structure-indicator {
            font-size: 0.55rem;
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            transition: opacity 0.15s ease;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            pointer-events: none;
            max-width: 90vw;
            text-align: center;
        }
        
        .structure-indicator.all-to-center {
            background: rgba(168, 85, 247, 0.2);
            color: var(--accent-purple);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
        }
        
        .structure-indicator.petals {
            background: rgba(74, 222, 128, 0.2);
            color: var(--accent-green);
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.4);
        }
        
        .structure-indicator.pi-coherent {
            background: rgba(34, 211, 238, 0.2);
            color: var(--accent-cyan);
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.4);
        }
        
        .structure-indicator.spiral {
            background: rgba(168, 85, 247, 0.2);
            color: #a855f7;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
        }
        
        .structure-indicator.pseudo {
            background: rgba(251, 191, 36, 0.15);
            color: #fbbf24;
            box-shadow: 0 0 10px rgba(251, 191, 36, 0.3);
            border: 1px dashed rgba(251, 191, 36, 0.4);
        }
        
        .structure-indicator.unclear {
            background: rgba(120, 120, 128, 0.1);
            color: var(--text-muted);
        }

        body.bw-scheme .structure-indicator {
            background: rgba(0, 0, 0, 0.06);
            color: var(--text-primary);
            border: 1px solid rgba(0, 0, 0, 0.16);
            box-shadow: none;
        }

        body.bw-scheme .structure-indicator.pseudo {
            border-style: dashed;
        }
        
        .label-container {
            min-height: 3.2em;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .formula-display {
            font-size: 0.5rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
            pointer-events: none;
            min-height: 1em;
        }
        
        .granularity-controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.3rem;
            margin-top: 0.3rem;
            pointer-events: auto;
            max-width: 350px;
        }
        
        .granularity-btn {
            background: var(--bg-surface);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.55rem;
            padding: 0.35rem 0.5rem;
            border-radius: 0.4rem;
            cursor: pointer;
            transition: all 0.2s ease;
            touch-action: manipulation;
        }
        
        .granularity-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }
        
        .granularity-btn.active {
            background: rgba(244, 208, 63, 0.15);
            border-color: var(--accent-yellow);
            color: var(--accent-yellow);
            box-shadow: 0 0 15px var(--glow-yellow);
        }
        
        .play-btn {
            background: var(--bg-surface);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            font-size: 0.9rem;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
            touch-action: manipulation;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 0.4rem;
            pointer-events: auto;
        }
        
        .play-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }
        
        .play-btn.playing {
            background: rgba(244, 208, 63, 0.15);
            border-color: var(--accent-yellow);
            color: var(--accent-yellow);
            box-shadow: 0 0 20px var(--glow-yellow);
        }
        
        .play-btn .pause-icon {
            display: none;
            font-size: 0.65rem;
            letter-spacing: 2px;
        }
        
        .play-btn.playing .play-icon {
            display: none;
        }
        
        .play-btn.playing .pause-icon {
            display: inline;
        }
        
        .tour-btn {
            background: var(--bg-surface);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.5rem;
            padding: 0.5rem 0.8rem;
            border-radius: 2rem;
            cursor: pointer;
            transition: all 0.2s ease;
            touch-action: manipulation;
            pointer-events: auto;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        
        .tour-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }
        
        .tour-btn.active {
            background: rgba(34, 211, 238, 0.15);
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.4);
        }

        body.bw-scheme .granularity-btn.active,
        body.bw-scheme .play-btn.playing,
        body.bw-scheme .tour-btn.active {
            background: rgba(0, 0, 0, 0.08);
            border-color: rgba(0, 0, 0, 0.72);
            color: var(--text-primary);
            box-shadow: none;
        }
        
        .playback-controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.6rem;
            align-items: center;
            margin-top: 0.4rem;
        }

        .tour-response-panel {
            position: fixed;
            top: 0.75rem;
            right: 0.75rem;
            width: min(520px, calc(100vw - 1.5rem));
            max-height: calc(100vh - 1.5rem);
            overflow: auto;
            background: rgba(18, 18, 31, 0.94);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 0.5rem;
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.38);
            padding: 0.7rem;
            pointer-events: auto;
            cursor: default;
            z-index: 900;
            backdrop-filter: blur(12px);
        }

        .tour-response-panel[hidden] {
            display: none;
        }

        canvas.tour-graph-canvas {
            display: block;
            width: 100%;
            height: 230px;
            border-radius: 0.35rem;
            background: #0b0d16;
            box-shadow: none;
            cursor: default;
            pointer-events: auto;
            touch-action: none;
        }

        .resonance-category-graphs {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.5rem;
            margin-top: 0.6rem;
        }

        canvas.resonance-category-canvas {
            display: block;
            width: 100%;
            height: 120px;
            border-radius: 0.35rem;
            background: #0b0d16;
            box-shadow: none;
            pointer-events: none;
        }

        body.bw-scheme #canvas {
            border-radius: 0;
            background: #ffffff;
            box-shadow: none;
        }

        body.bw-scheme .granularity-btn,
        body.bw-scheme .play-btn,
        body.bw-scheme .tour-btn {
            background: #ffffff;
            border-color: rgba(0, 0, 0, 0.34);
            color: #111111;
        }

        body.bw-scheme .granularity-btn:hover,
        body.bw-scheme .play-btn:hover,
        body.bw-scheme .tour-btn:hover {
            background: rgba(0, 0, 0, 0.04);
            border-color: rgba(0, 0, 0, 0.56);
        }

        body.bw-scheme .tour-response-panel {
            background: rgba(255, 255, 255, 0.96);
            border-color: rgba(0, 0, 0, 0.24);
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.12);
        }

        .coherence-param-controls {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.42rem 0.6rem;
            margin-top: 0.65rem;
            padding-top: 0.65rem;
            border-top: 1px solid rgba(168, 85, 247, 0.18);
        }

        .coherence-param-control {
            display: grid;
            grid-template-columns: 5.2rem minmax(0, 1fr) 2.8rem;
            gap: 0.35rem;
            align-items: center;
            color: var(--text-muted);
            font-size: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.07em;
        }

        .coherence-param-control input {
            width: 100%;
            accent-color: var(--accent-purple);
            cursor: pointer;
        }

        #coherenceAngularMultiplierInput {
            accent-color: var(--accent-green);
        }

        #coherenceRationalMultiplierInput {
            accent-color: var(--accent-orange);
        }

        .coherence-param-control output {
            color: var(--text-primary);
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .tour-remap-controls {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.42rem 0.6rem;
            margin-top: 0.65rem;
        }

        .tour-remap-control {
            display: grid;
            grid-template-columns: 4.2rem minmax(0, 1fr) 2.8rem;
            gap: 0.35rem;
            align-items: center;
            color: var(--text-muted);
            font-size: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.07em;
        }

        .tour-remap-control input {
            width: 100%;
            accent-color: var(--accent-yellow);
            cursor: pointer;
        }

        .tour-remap-control output {
            color: var(--text-primary);
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        @media (max-width: 760px), (max-height: 700px) {
            .tour-response-panel {
                top: auto;
                right: 0.5rem;
                bottom: 2.6rem;
                width: calc(100vw - 1rem);
                max-height: 48vh;
            }

            .tour-remap-controls {
                grid-template-columns: 1fr;
            }

            .resonance-category-graphs,
            .coherence-param-controls {
                grid-template-columns: 1fr;
            }
        }

        .drag-hint {
            position: fixed;
            bottom: 0.8rem;
            font-size: 0.5rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            opacity: 0.6;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        
        .drag-hint::before,
        .drag-hint::after {
            content: '←';
            font-size: 0.6rem;
        }
        
        .drag-hint::after {
            content: '→';
        }
        
        .drag-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 4px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                var(--accent-blue) 20%, 
                var(--accent-yellow) 80%, 
                transparent 100%
            );
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
        }
        
        .drag-indicator.active {
            opacity: 0.3;
        }
        
        .range-display {
            font-size: 0.5rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            width: 140px;
            margin-top: 0.2rem;
            pointer-events: none;
        }
        
        .particle-tooltip {
            position: fixed;
            background: var(--bg-surface);
            border: 1px solid var(--accent-yellow);
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            padding: 0.4rem 0.6rem;
            border-radius: 0.3rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s ease;
            z-index: 1000;
            box-shadow: 0 0 10px var(--glow-yellow);
        }
        
        .particle-tooltip.visible {
            opacity: 1;
        }
    </style>
</head>
<body>
    <h1>Radial Petal Modulation</h1>
    <p class="subtitle">Golden Angle Spiral × Sinusoidal Shaping</p>
    
    <div class="canvas-container">
        <canvas id="canvas"></canvas>
    </div>
    
    <div class="controls">
        <div class="value-display" id="valueDisplay">3.00</div>
        <div class="range-display">
            <span>–∞</span>
            <span>+∞</span>
        </div>
        <div class="label-container">
            <div class="structure-indicator unclear" id="structureIndicator">UNCLEAR</div>
            <div class="formula-display" id="formulaDisplay"></div>
        </div>
        
        <div class="granularity-controls">
            <button class="granularity-btn" data-step="0.1">0.1</button>
            <button class="granularity-btn active" data-step="0.01">0.01</button>
            <button class="granularity-btn" data-step="0.001">0.001</button>
            <button class="granularity-btn" data-step="0.0001">0.0001</button>
            <button class="granularity-btn" data-step="0.00001">0.00001</button>
            <button class="granularity-btn" data-step="0.000001">0.000001</button>
        </div>
        
        <button class="play-btn" id="playBtn">
            <span class="play-icon">▶</span>
            <span class="pause-icon">❚❚</span>
        </button>
        
        <div class="playback-controls">
            <button class="tour-btn" id="tourBtn">🎯 Coherence Tour</button>
            <button class="tour-btn" id="colorBtn">🎨 Birth Order Colors</button>
            <button class="tour-btn" id="schemeBtn">B/W Scheme</button>
            <button class="tour-btn" id="tourSettingsBtn" aria-expanded="false" aria-controls="tourResponsePanel">Tour Response</button>
        </div>
    </div>

    <div class="tour-response-panel" id="tourResponsePanel" hidden>
        <canvas class="tour-graph-canvas" id="tourGraphCanvas"></canvas>
        <div class="resonance-category-graphs">
            <canvas class="resonance-category-canvas" id="angularGraphCanvas"></canvas>
            <canvas class="resonance-category-canvas" id="rationalGraphCanvas"></canvas>
        </div>
        <div class="coherence-param-controls" id="coherenceParamControls">
            <label class="coherence-param-control">
                <span>Angular x</span>
                <input id="coherenceAngularMultiplierInput" type="range" min="0" max="3" step="0.05" value="1">
                <output id="coherenceAngularMultiplierOutput"></output>
            </label>
            <label class="coherence-param-control">
                <span>Rational x</span>
                <input id="coherenceRationalMultiplierInput" type="range" min="0" max="3" step="0.05" value="1">
                <output id="coherenceRationalMultiplierOutput"></output>
            </label>
        </div>
        <div class="tour-remap-controls" id="tourRemapControls">
            <label class="tour-remap-control">
                <span>Range</span>
                <input id="tourRangeInput" type="range" min="0.0001" max="0.25" step="0.0001" value="0.063">
                <output id="tourRangeOutput"></output>
            </label>
            <label class="tour-remap-control">
                <span>Black</span>
                <input id="tourBlackInput" type="range" min="0" max="0.95" step="0.01" value="0">
                <output id="tourBlackOutput"></output>
            </label>
            <label class="tour-remap-control">
                <span>White</span>
                <input id="tourWhiteInput" type="range" min="0.05" max="1" step="0.01" value="1">
                <output id="tourWhiteOutput"></output>
            </label>
            <label class="tour-remap-control">
                <span>Gamma</span>
                <input id="tourGammaInput" type="range" min="0.2" max="3" step="0.05" value="1.45">
                <output id="tourGammaOutput"></output>
            </label>
            <label class="tour-remap-control">
                <span>Smoothing</span>
                <input id="tourSmoothingInput" type="range" min="0" max="250" step="1" value="200">
                <output id="tourSmoothingOutput"></output>
            </label>
            <label class="tour-remap-control">
                <span>Input</span>
                <input id="tourInputGainInput" type="range" min="0" max="2.5" step="0.05" value="1">
                <output id="tourInputGainOutput"></output>
            </label>
            <label class="tour-remap-control">
                <span>Output</span>
                <input id="tourOutputGainInput" type="range" min="0" max="2" step="0.05" value="0.8">
                <output id="tourOutputGainOutput"></output>
            </label>
            <label class="tour-remap-control">
                <span>Lift</span>
                <input id="tourLiftInput" type="range" min="-1" max="1" step="0.01" value="0">
                <output id="tourLiftOutput"></output>
            </label>
            <label class="tour-remap-control">
                <span>Multiply</span>
                <input id="tourMultiplyInput" type="range" min="0" max="3" step="0.05" value="1.05">
                <output id="tourMultiplyOutput"></output>
            </label>
            <label class="tour-remap-control">
                <span>Offset</span>
                <input id="tourOffsetInput" type="range" min="-1" max="1" step="0.01" value="-0.12">
                <output id="tourOffsetOutput"></output>
            </label>
        </div>
    </div>
    
    <div class="drag-indicator" id="dragIndicator"></div>
    <div class="drag-hint">Drag anywhere to adjust</div>
    <div class="particle-tooltip" id="particleTooltip"></div>
    
    <script>
        // Constants

        // A coherence basis: an algebraic number ψ whose lattice ℤ + ψ·ℤ
        // generates the visible coherence structure. For the golden family,
        // ψ = φ and the modulation period α² = φ². Powers of ψ decompose onto
        // the lattice via Fibonacci coefficients — see VogelSpiral.lean's
        // `goldenRatio_pow_eq_fib_decomposition` and `step_size_decomposition`.
        const GOLDEN_BASIS = (() => {
            const psi = (1 + Math.sqrt(5)) / 2;
            return { psi, psiName: 'φ', alphaSq: psi * psi };
        })();
        // Scalar aliases used throughout the resonance model and renderer.
        const PHI = GOLDEN_BASIS.psi;              // φ ≈ 1.618
        const PHI_2 = GOLDEN_BASIS.alphaSq;         // φ² ≈ 2.618
        const PI = Math.PI;
        // Canvas and rendering setup
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const valueDisplay = document.getElementById('valueDisplay');
        const structureIndicator = document.getElementById('structureIndicator');
        const formulaDisplay = document.getElementById('formulaDisplay');
        const dragIndicator = document.getElementById('dragIndicator');
        const granularityBtns = document.querySelectorAll('.granularity-btn');
        const playBtn = document.getElementById('playBtn');
        const tourBtn = document.getElementById('tourBtn');
        const colorBtn = document.getElementById('colorBtn');
        const schemeBtn = document.getElementById('schemeBtn');
        const tourSettingsBtn = document.getElementById('tourSettingsBtn');
        const tourResponsePanel = document.getElementById('tourResponsePanel');
        const tourGraphCanvas = document.getElementById('tourGraphCanvas');
        const tourGraphCtx = tourGraphCanvas.getContext('2d');
        const angularGraphCanvas = document.getElementById('angularGraphCanvas');
        const rationalGraphCanvas = document.getElementById('rationalGraphCanvas');
        const categoryGraphs = [
            { key: 'angular', label: 'Angular', canvas: angularGraphCanvas, ctx: angularGraphCanvas.getContext('2d'), color: 'rgba(74, 222, 128, 0.9)' },
            { key: 'rational', label: 'Rational', canvas: rationalGraphCanvas, ctx: rationalGraphCanvas.getContext('2d'), color: 'rgba(251, 146, 60, 0.9)' },
        ];
        const coherenceAngularMultiplierInput = document.getElementById('coherenceAngularMultiplierInput');
        const coherenceAngularMultiplierOutput = document.getElementById('coherenceAngularMultiplierOutput');
        const coherenceRationalMultiplierInput = document.getElementById('coherenceRationalMultiplierInput');
        const coherenceRationalMultiplierOutput = document.getElementById('coherenceRationalMultiplierOutput');

        function harmonicMod(x, period) {
            return ((x % period) + period) % period;
        }

        function harmonicModInt(x, period) {
            return ((x % period) + period) % period;
        }

        function harmonicGcd(a, b) {
            let x = Math.abs(a);
            let y = Math.abs(b);

            while (y !== 0) {
                const temp = y;
                y = x % y;
                x = temp;
            }

            return Math.max(1, x);
        }

        function harmonicStep(P) {
            return P / PHI_2;
        }

        function modulationResidue(P) {
            return harmonicMod(harmonicStep(P), 1);
        }

        function harmonicUnitDistance(x) {
            const wrapped = harmonicMod(x, 1);
            return Math.min(wrapped, 1 - wrapped);
        }

        function harmonicFormatPetalLabel(count, prefix = '') {
            const noun = count === 1 ? 'petal' : 'petals';
            return prefix ? `${prefix} ${count} ${noun}` : `${count} ${noun}`;
        }

        function harmonicFormatRational(numerator, denominator) {
            const divisor = harmonicGcd(numerator, denominator);
            const reducedNumerator = numerator / divisor;
            const reducedDenominator = denominator / divisor;
            return reducedDenominator === 1
                ? `${reducedNumerator}`
                : `${reducedNumerator}/${reducedDenominator}`;
        }

        function harmonicFormatPhi2Fraction(branch, divisor = 1) {
            const numerator = branch === 1 ? 'phi^2' : `${branch}phi^2`;
            return divisor === 1 ? numerator : `${numerator}/${divisor}`;
        }

        function harmonicAngularFormula(m, K, sign, branch) {
            if (K === 0) {
                return branch === 0
                    ? 'P ~= 0 (mod phi^2)'
                    : `P ~= ${harmonicFormatPhi2Fraction(branch, m)} (mod phi^2)`;
            }

            if (branch === 0) {
                return `P ~= ${sign < 0 ? '-' : ''}${harmonicFormatRational(K, m)} (mod phi^2)`;
            }

            const phiTerm = branch === 1 ? 'phi^2' : `${branch}phi^2`;
            return `P ~= (${phiTerm} ${sign < 0 ? '-' : '+'} ${K})/${m} (mod phi^2)`;
        }

        function harmonicEchoLabel(m) {
            if (m === 2) return '1st echo';
            if (m === 3) return '2nd echo';
            if (m === 4) return '3rd echo';
            return `${m}th echo`;
        }

        function harmonicWeight(amplitude) {
            return Math.pow(Math.abs(amplitude) / HARMONIC_PRIMARY_WEIGHT, 0.35);
        }

        function harmonicPetalVisibility(K) {
            if (K === 0) return 0.72;

            const base = 1 / (1 + 0.025 * K + 0.0025 * K * K);
            const fibonacciBonus = [1, 2, 3, 5, 8, 13, 21, 34].includes(K) ? 1.08 : 1;
            return base * fibonacciBonus;
        }

        function harmonicDirectPenalty(K) {
            if (K <= 12) return 1;
            return 1 / (1 + 0.05 * (K - 12));
        }

        function harmonicDirichlet(delta, effectiveLength) {
            const wrappedDelta = harmonicUnitDistance(delta);

            if (wrappedDelta < 1e-12) {
                return 1;
            }

            const denominator = Math.sin(PI * wrappedDelta);
            if (Math.abs(denominator) < 1e-12) {
                return 1;
            }

            return Math.abs(
                Math.sin(PI * effectiveLength * wrappedDelta) /
                (effectiveLength * denominator)
            );
        }

        function harmonicAngularCandidates(P) {
            const step = harmonicStep(P);
            const candidates = [];

            for (const channel of HARMONIC_RESONANCE_CHANNELS) {
                const scaledStep = channel.m * step;
                const channelWeight = harmonicWeight(channel.amplitude);

                for (let K = 0; K <= HARMONIC_PETAL_LIMIT; K++) {
                    const signs = K === 0 ? [1] : [-1, 1];
                    let bestChoice = null;

                    for (const sign of signs) {
                        const target = sign * K / PHI_2;
                        const integerShift = Math.round(scaledStep - target);
                        const delta = harmonicUnitDistance(scaledStep - target);
                        const branch = harmonicModInt(integerShift, channel.m);
                        const rawScore = channelWeight * harmonicDirichlet(delta, HARMONIC_EFFECTIVE_LENGTH);
                        let score = rawScore * harmonicPetalVisibility(K) * harmonicDirectPenalty(K);

                        if (K === 0 && channel.m > 1) {
                            score *= 0.86;
                        }

                        const candidate = {
                            kind: 'angular',
                            type: K === 0
                                ? (channel.m === 1 ? 'all-to-center' : 'pseudo')
                                : (channel.m === 1 ? 'petals' : 'pseudo'),
                            label: K === 0
                                ? (channel.m === 1 ? 'All-to-center' : `${harmonicEchoLabel(channel.m)} core echo`)
                                : (channel.m === 1
                                    ? harmonicFormatPetalLabel(K)
                                    : harmonicFormatPetalLabel(K, harmonicEchoLabel(channel.m))),
                            formula: harmonicAngularFormula(channel.m, K, sign, branch),
                            score,
                            rawScore,
                            delta,
                            distanceP: delta * PHI_2 / channel.m,
                            m: channel.m,
                            K,
                            sign,
                            branch,
                        };

                        if (!bestChoice || candidate.score > bestChoice.score) {
                            bestChoice = candidate;
                        }
                    }

                    if (bestChoice) {
                        candidates.push(bestChoice);
                    }
                }
            }

            return candidates.sort((a, b) => b.score - a.score);
        }

        function harmonicRationalCandidates(P) {
            const step = harmonicStep(P);

            return HARMONIC_RATIONAL_CHANNELS
                .map((channel) => {
                    const delta = harmonicUnitDistance(channel.q * step);
                    const rawScore = harmonicDirichlet(delta, channel.effectiveLength);
                    return {
                        kind: 'rational',
                        type: channel.type,
                        label: channel.label,
                        formula: channel.formula,
                        score: channel.weight * rawScore,
                        rawScore,
                        delta,
                        q: channel.q,
                    };
                })
                .sort((a, b) => b.score - a.score);
        }

        function harmonicBestRational(candidates) {
            const q5 = candidates.find((candidate) => candidate.q === 5) || null;
            const q10 = candidates.find((candidate) => candidate.q === 10) || null;

            if (q5 && q5.score >= 0.25) {
                return q5;
            }

            if (q10 && (!q5 || q10.score >= q5.score * 0.95)) {
                return q10;
            }

            return q5 || q10;
        }

        function harmonicMixedCandidates(angularCandidates) {
            const carriers = angularCandidates
                .filter((candidate) => candidate.rawScore > 0.04)
                .slice(0, 25);
            const bestByKey = new Map();

            for (let i = 0; i < carriers.length; i++) {
                for (let j = i + 1; j < carriers.length; j++) {
                    const first = carriers[i];
                    const second = carriers[j];

                    if (first.K === 0 && second.K === 0) {
                        continue;
                    }

                    if (first.K === 0 || second.K === 0) {
                        const nonzero = first.K === 0 ? second : first;
                        if (nonzero.K > HARMONIC_HYBRID_LIMIT) {
                            continue;
                        }

                        const score = Math.sqrt(first.rawScore * second.rawScore) * 0.78 * harmonicPetalVisibility(nonzero.K);
                        const key = `hybrid:${nonzero.K}`;
                        const candidate = {
                            kind: 'hybrid',
                            type: 'spiral',
                            label: `Core + ${nonzero.K} petals`,
                            formula: `Core echo + ${nonzero.K}-petal carrier`,
                            score,
                            K: nonzero.K,
                            sources: [first, second],
                        };

                        if (!bestByKey.has(key) || candidate.score > bestByKey.get(key).score) {
                            bestByKey.set(key, candidate);
                        }

                        continue;
                    }

                    const envelope = Math.abs(first.K - second.K);
                    if (envelope < 1 || envelope > HARMONIC_MIXED_LIMIT) {
                        continue;
                    }

                    const envelopeWeight = 1 / (1 + 0.18 * (envelope - 1));
                    const score = Math.sqrt(first.rawScore * second.rawScore) * 0.82 * envelopeWeight;
                    const lo = Math.min(first.K, second.K);
                    const hi = Math.max(first.K, second.K);
                    const key = `envelope:${envelope}`;
                    const candidate = {
                        kind: 'envelope',
                        type: 'pseudo',
                        label: harmonicFormatPetalLabel(envelope, 'Diffuse pseudo'),
                        formula: `Beat envelope |${hi} - ${lo}| = ${envelope}`,
                        score,
                        K: envelope,
                        sources: [first, second],
                    };

                    if (!bestByKey.has(key) || candidate.score > bestByKey.get(key).score) {
                        bestByKey.set(key, candidate);
                    }
                }
            }

            return Array.from(bestByKey.values()).sort((a, b) => b.score - a.score);
        }

        function analyzeCoherence(P) {
            const angularCandidates = harmonicAngularCandidates(P);
            const rationalCandidates = harmonicRationalCandidates(P);
            const mixedCandidates = harmonicMixedCandidates(angularCandidates);
            const groundCandidate = angularCandidates.find((candidate) => candidate.m === 1 && candidate.K === 0) || null;
            const coreEchoCandidate = angularCandidates.find((candidate) => candidate.K === 0 && candidate.m > 1) || null;
            const bestAngular = angularCandidates.find((candidate) => !(candidate.m === 1 && candidate.K === 0)) || null;
            const bestRational = harmonicBestRational(rationalCandidates);
            const bestMixed = mixedCandidates[0] || null;
            const currentBest = Math.max(
                bestAngular ? bestAngular.score : 0,
                bestRational ? bestRational.score : 0,
                bestMixed ? bestMixed.score : 0
            );
            let winner = null;

            if (
                groundCandidate &&
                groundCandidate.score > HARMONIC_GROUND_MIN &&
                groundCandidate.score >= currentBest * HARMONIC_GROUND_RATIO
            ) {
                winner = groundCandidate;
            } else if (
                bestMixed &&
                bestMixed.kind === 'hybrid' &&
                coreEchoCandidate &&
                coreEchoCandidate.score > HARMONIC_CORE_MIN &&
                bestMixed.score >= coreEchoCandidate.score * HARMONIC_HYBRID_RATIO
            ) {
                winner = bestMixed;
            } else if (
                bestMixed &&
                bestMixed.kind === 'envelope' &&
                bestAngular &&
                bestMixed.score > HARMONIC_DISPLAY_CUTOFF &&
                bestMixed.score >= bestAngular.score * HARMONIC_ENVELOPE_RATIO
            ) {
                winner = bestMixed;
            } else if (
                bestRational &&
                bestAngular &&
                bestRational.score > HARMONIC_RATIONAL_MIN &&
                bestRational.score >= bestAngular.score * HARMONIC_RATIONAL_RATIO
            ) {
                winner = bestRational;
            } else if (bestAngular && bestAngular.score > HARMONIC_DISPLAY_CUTOFF) {
                winner = bestAngular;
            } else if (bestRational && bestRational.score > HARMONIC_RATIONAL_MIN) {
                winner = bestRational;
            } else if (bestMixed && bestMixed.score > HARMONIC_DISPLAY_CUTOFF) {
                winner = bestMixed;
            }

            if (!winner) {
                winner = {
                    type: 'unclear',
                    label: 'Unclear',
                    formula: '',
                    score: 0,
                };
            }

            return {
                ...winner,
                score: Math.max(0, Math.min(1, winner.score || 0)),
                angularCandidates,
                rationalCandidates,
                mixedCandidates,
            };
        }

        function detectCoherence(x) {
            const result = analyzeCoherence(x);
            return {
                type: result.type,
                label: result.label,

        function runTheoryVerification() {
            return THEORY_BENCHMARKS.map(({ name, P }) => {
                const result = analyzeCoherence(P);
                return {

        window.harmonicResonanceDebug = {

        function clamp01(value) {
            return Math.max(0, Math.min(1, value));

        function getUiColor(name) {

        function getCategoryGraphColor(graph) {

        const coherenceAnalysisCache = new Map();

        function coherenceCacheKey(P) {
            return P.toFixed(8);

        function clearCoherenceAnalysisCacheIfNeeded() {
            if (coherenceAnalysisCache.size > COHERENCE_ANALYSIS_CACHE_LIMIT) {
                coherenceAnalysisCache.clear();
            }
        }

        function getCoherenceAnalysis(P) {
            const key = coherenceCacheKey(P);
            const cached = coherenceAnalysisCache.get(key);

            if (cached) {
                return cached;
            }

            clearCoherenceAnalysisCacheIfNeeded();

            const angularCandidates = harmonicAngularCandidates(P);
            const rationalCandidates = harmonicRationalCandidates(P);
            const analysis = {
                angularCandidates,
                rationalCandidates,
                bestRational: harmonicBestRational(rationalCandidates),
                mixedCandidates: null,
            };

            coherenceAnalysisCache.set(key, analysis);
            return analysis;
        }

        function coherenceStrength(P) {
            return getRawCoherenceFromCategoryScores(getCandidateCategoryScores(P));
        }

        function getDirectCategoryScores(P) {
            const analysis = getCoherenceAnalysis(P);
            return {
                angular: clamp01(analysis.angularCandidates[0] ? analysis.angularCandidates[0].score : 0),
                angularTour: getAngularTourScoreFromCandidates(analysis.angularCandidates),
                rational: clamp01(analysis.bestRational ? analysis.bestRational.score : 0),
            };
        }

        function getCandidateCategoryScores(P) {
            const analysis = getCoherenceAnalysis(P);
            const directScores = getDirectCategoryScores(P);

            if (!analysis.mixedCandidates) {
                analysis.mixedCandidates = harmonicMixedCandidates(analysis.angularCandidates);
            }

            return {
                ...directScores,
                mixed: clamp01(analysis.mixedCandidates[0] ? analysis.mixedCandidates[0].score : 0),
            };
        }

        function getAngularTourScoreFromCandidates(angularCandidates) {
            let bestScore = 0;

            for (const candidate of angularCandidates) {
                const boost = candidate.K === 0 && candidate.m === 3
                    ? HARMONIC_SECOND_CORE_ECHO_TOUR_BOOST
                    : 1;
                bestScore = Math.max(bestScore, candidate.score * boost);
            }

            return clamp01(bestScore);
        }

        function getRawCoherenceFromCategoryScores(scores) {
            return clamp01(Math.max(scores.angular, scores.rational, scores.mixed));
        }

        function getWeightedCoherenceFromCategoryScores(scores) {
            const angularTourScore = scores.angularTour ?? scores.angular;
            return clamp01(Math.max(
                angularTourScore * coherenceTypeMultipliers.angular,
                scores.rational * coherenceTypeMultipliers.rational
            ));
        }

        function weightedCoherenceStrength(P) {
            return getWeightedCoherenceFromCategoryScores(getDirectCategoryScores(P));
        }

        function getTourSmoothingAmount() {
            return clamp01(tourRemap.smoothing / 250);
        }

        function getTourSmoothingRadius() {
            return TOUR_SMOOTHING_MAX_RADIUS * getTourSmoothingAmount();
        }

        function getDirectionalWeightedPeak(P, direction, radius) {
            let peak = 0;

            for (let i = 1; i <= TOUR_SMOOTHING_SAMPLES_PER_SIDE; i++) {
                const sampleP = P + direction * radius * (i / TOUR_SMOOTHING_SAMPLES_PER_SIDE);
                peak = Math.max(peak, weightedCoherenceStrength(sampleP));
            }

            return peak;
        }

        function smoothedWeightedCoherenceStrength(P) {
            const smoothing = getTourSmoothingAmount();
            const center = weightedCoherenceStrength(P);

            if (smoothing <= 0) {
                return center;
            }

            const radius = getTourSmoothingRadius();
            const leftPeak = getDirectionalWeightedPeak(P, -1, radius);
            const rightPeak = getDirectionalWeightedPeak(P, 1, radius);
            const bridgeTarget = Math.min(leftPeak, rightPeak);

            if (bridgeTarget <= center) {
                return center;
            }

            const valleyDepth = bridgeTarget - center;
            const valleyGate = clamp01(valleyDepth / 0.08);
            return clamp01(center + valleyDepth * smoothing * valleyGate);
        }

        function getSmoothedWeightedSeries(samplePs) {
            const weightedScores = samplePs.map((P) => weightedCoherenceStrength(P));
            const smoothing = getTourSmoothingAmount();

            if (smoothing <= 0) {
                return weightedScores;
            }

            const radius = getTourSmoothingRadius();
            return weightedScores.map((center, index) => {
                let leftPeak = 0;
                let rightPeak = 0;

                for (let i = index - 1; i >= 0 && samplePs[index] - samplePs[i] <= radius; i--) {
                    leftPeak = Math.max(leftPeak, weightedScores[i]);
                }

                for (let i = index + 1; i < samplePs.length && samplePs[i] - samplePs[index] <= radius; i++) {
                    rightPeak = Math.max(rightPeak, weightedScores[i]);
                }

                const bridgeTarget = Math.min(leftPeak, rightPeak);
                if (bridgeTarget <= center) {
                    return center;
                }

                const valleyDepth = bridgeTarget - center;
                const valleyGate = clamp01(valleyDepth / 0.08);
                return clamp01(center + valleyDepth * smoothing * valleyGate);
            });
        }

        function getTourWeightFromCoherence(coherenceScore) {
            const inputValue = clamp01(coherenceScore * tourRemap.input);
            const span = Math.max(0.01, tourRemap.white - tourRemap.black);
            const normalized = clamp01((inputValue - tourRemap.black) / span);
            const curved = Math.pow(normalized, 1 / Math.max(0.05, tourRemap.gamma));
            const lifted = tourRemap.lift >= 0
                ? curved + tourRemap.lift * (1 - curved)
                : curved * (1 + tourRemap.lift);
            return clamp01((lifted * tourRemap.multiply + tourRemap.offset) * tourRemap.output);
        }

        function getTourWeight(P) {
            return getTourWeightFromCoherence(smoothedWeightedCoherenceStrength(P));
        }

        function getTourSpeed(x) {
            const strength = getTourWeight(x);
            // Log interpolation for the large speed range
            const logPeak = Math.log(TOUR_PEAK_SPEED);
            const logCruise = Math.log(TOUR_CRUISE_SPEED);
            const logSpeed = logCruise + (logPeak - logCruise) * strength;
            let targetSpeed = Math.min(Math.exp(logSpeed), TOUR_MAX_STEP);
            
            // Cap acceleration rate, but only while below cruise
            if (targetSpeed > lastTourSpeed && lastTourSpeed < TOUR_CRUISE_SPEED) {
                targetSpeed = Math.min(lastTourSpeed * MAX_SPEED_INCREASE_RATE, TOUR_CRUISE_SPEED);
            }
            
            lastTourSpeed = targetSpeed;
            return targetSpeed;
        }

        function getTourGraphWindowStart() {
            return numPetals - tourRemap.range * TOUR_GRAPH_PLAYHEAD_T;
        }

        function getTourGraphRect() {
            const width = tourGraphCanvas.clientWidth || 420;
            const height = tourGraphCanvas.clientHeight || 230;
            return {
                x: 44,
                y: 18,
                width: width - 62,
                height: height - 52,
            };
        }

        function resizeGraphCanvas(canvas, ctx, fallbackWidth = 420, fallbackHeight = 160) {
            const graphDpr = window.devicePixelRatio || 1;
            const width = canvas.clientWidth || fallbackWidth;
            const height = canvas.clientHeight || fallbackHeight;
            canvas.width = width * graphDpr;
            canvas.height = height * graphDpr;
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(graphDpr, graphDpr);
        }

        function resizeTourGraph() {
            resizeGraphCanvas(tourGraphCanvas, tourGraphCtx, 420, 230);
            categoryGraphs.forEach((graph) => resizeGraphCanvas(graph.canvas, graph.ctx, 150, 120));
            drawTourGraph();
        }

        function tourGraphXForP(P, windowStart, rect) {
            return rect.x + ((P - windowStart) / tourRemap.range) * rect.width;
        }

        function tourGraphYForValue(value, rect) {
            return rect.y + (1 - clamp01(value)) * rect.height;
        }

        function drawTourGraphLine(points, color, width) {
            tourGraphCtx.beginPath();
            points.forEach((point, index) => {
                if (index === 0) {
                    tourGraphCtx.moveTo(point.x, point.y);
                } else {
                    tourGraphCtx.lineTo(point.x, point.y);
                }
            });
            tourGraphCtx.strokeStyle = color;
            tourGraphCtx.lineWidth = width;
            tourGraphCtx.lineJoin = 'round';
            tourGraphCtx.lineCap = 'round';
            tourGraphCtx.stroke();
        }

        function drawCanvasLine(ctx, points, color, width) {
            ctx.beginPath();
            points.forEach((point, index) => {
                if (index === 0) {
                    ctx.moveTo(point.x, point.y);
                } else {
                    ctx.lineTo(point.x, point.y);
                }
            });
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.stroke();
        }

        function getCategoryGraphRect(canvas) {
            const width = canvas.clientWidth || 150;
            const height = canvas.clientHeight || 120;
            return {
                x: 30,
                y: 16,
                width: width - 40,
                height: height - 34,
            };
        }

        function drawResonanceCategoryGraphs(windowStart) {
            const samples = getGraphSamplePs(windowStart)
                .map((P) => ({ P, scores: getDirectCategoryScores(P) }));

            for (const graph of categoryGraphs) {
                const canvas = graph.canvas;
                const ctx = graph.ctx;
                const width = canvas.clientWidth || 150;
                const height = canvas.clientHeight || 120;
                const rect = getCategoryGraphRect(canvas);

                ctx.clearRect(0, 0, width, height);
                ctx.fillStyle = getUiColor('graphBackground');
                ctx.fillRect(0, 0, width, height);

                ctx.strokeStyle = getUiColor('graphGrid');
                ctx.lineWidth = 1;
                for (let i = 0; i <= 2; i++) {
                    const y = rect.y + (i / 2) * rect.height;
                    ctx.beginPath();
                    ctx.moveTo(rect.x, y);
                    ctx.lineTo(rect.x + rect.width, y);
                    ctx.stroke();
                }
                for (let i = 0; i <= 2; i++) {
                    const x = rect.x + (i / 2) * rect.width;
                    ctx.beginPath();
                    ctx.moveTo(x, rect.y);
                    ctx.lineTo(x, rect.y + rect.height);
                    ctx.stroke();
                }

                ctx.strokeStyle = getUiColor('graphBorder');
                ctx.strokeRect(rect.x, rect.y, rect.width, rect.height);

                const points = samples.map((sample) => ({
                    x: tourGraphXForP(sample.P, windowStart, rect),
                    y: tourGraphYForValue(sample.scores[graph.key], rect),
                }));
                drawCanvasLine(ctx, points, getCategoryGraphColor(graph), 2);

                const currentX = rect.x + TOUR_GRAPH_PLAYHEAD_T * rect.width;
                ctx.strokeStyle = getUiColor('playhead');
                ctx.setLineDash([3, 4]);
                ctx.beginPath();
                ctx.moveTo(currentX, rect.y);
                ctx.lineTo(currentX, rect.y + rect.height);
                ctx.stroke();
                ctx.setLineDash([]);

                const currentScore = getCandidateCategoryScores(numPetals)[graph.key];
                ctx.font = '9px JetBrains Mono, monospace';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                ctx.fillStyle = getCategoryGraphColor(graph);
                ctx.fillText(graph.label, rect.x + 5, rect.y + 5);
                ctx.textAlign = 'right';
                ctx.fillStyle = getUiColor('graphText');
                ctx.fillText(currentScore.toFixed(2), rect.x + rect.width - 5, rect.y + 5);
            }
        }

        function drawTourGraph() {
            const width = tourGraphCanvas.clientWidth || 420;
            const height = tourGraphCanvas.clientHeight || 230;
            const rect = getTourGraphRect();
            const windowStart = getTourGraphWindowStart();
            const windowEnd = windowStart + tourRemap.range;

            tourGraphCtx.clearRect(0, 0, width, height);
            tourGraphCtx.fillStyle = getUiColor('graphBackground');
            tourGraphCtx.fillRect(0, 0, width, height);

            tourGraphCtx.strokeStyle = getUiColor('graphGrid');
            tourGraphCtx.lineWidth = 1;
            for (let i = 0; i <= 4; i++) {
                const x = rect.x + (i / 4) * rect.width;
                tourGraphCtx.beginPath();
                tourGraphCtx.moveTo(x, rect.y);
                tourGraphCtx.lineTo(x, rect.y + rect.height);
                tourGraphCtx.stroke();
            }

            for (let i = 0; i <= 4; i++) {
                const y = rect.y + (i / 4) * rect.height;
                tourGraphCtx.beginPath();
                tourGraphCtx.moveTo(rect.x, y);
                tourGraphCtx.lineTo(rect.x + rect.width, y);
                tourGraphCtx.stroke();
            }

            tourGraphCtx.strokeStyle = getUiColor('graphBorder');
            tourGraphCtx.strokeRect(rect.x, rect.y, rect.width, rect.height);

            tourGraphCtx.fillStyle = getUiColor('graphText');
            tourGraphCtx.font = '10px JetBrains Mono, monospace';
            tourGraphCtx.textAlign = 'right';
            tourGraphCtx.textBaseline = 'middle';
            for (const value of [0, 0.5, 1]) {
                tourGraphCtx.fillText(value.toFixed(1), rect.x - 8, tourGraphYForValue(value, rect));
            }

            tourGraphCtx.textAlign = 'center';
            tourGraphCtx.textBaseline = 'top';
            for (const p of [windowStart, numPetals, windowEnd]) {
                tourGraphCtx.fillText(formatGraphPValue(p), tourGraphXForP(p, windowStart, rect), rect.y + rect.height + 8);
            }

            tourGraphCtx.textAlign = 'right';
            tourGraphCtx.fillText('P', rect.x + rect.width, height - 12);

            tourGraphCtx.save();
            tourGraphCtx.translate(13, rect.y + rect.height / 2);
            tourGraphCtx.rotate(-Math.PI / 2);
            tourGraphCtx.textAlign = 'center';
            tourGraphCtx.fillText('coherence', 0, 0);
            tourGraphCtx.restore();

            const coherencePoints = [];
            const weightPoints = [];
            const graphSamplePs = getGraphSamplePs(windowStart);
            const graphWeightedScores = getSmoothedWeightedSeries(graphSamplePs);
            let currentCoherence = 0;
            let currentTourWeight = 0;
            for (let index = 0; index < graphSamplePs.length; index++) {
                const P = graphSamplePs[index];
                const x = tourGraphXForP(P, windowStart, rect);
                const categoryScores = getCandidateCategoryScores(P);
                const coherence = getRawCoherenceFromCategoryScores(categoryScores);
                const tourWeight = getTourWeightFromCoherence(graphWeightedScores[index]);
                if (Math.abs(P - numPetals) < 1e-10) {
                    currentCoherence = coherence;
                    currentTourWeight = tourWeight;
                }
                coherencePoints.push({
                    x,
                    y: tourGraphYForValue(coherence, rect),
                });
                weightPoints.push({
                    x,
                    y: tourGraphYForValue(tourWeight, rect),
                });
            }

            drawTourGraphLine(coherencePoints, getUiColor('coherenceLine'), 1.5);
            drawTourGraphLine(weightPoints, getUiColor('tourWeightLine'), 2.5);

            const currentX = rect.x + TOUR_GRAPH_PLAYHEAD_T * rect.width;
            tourGraphCtx.strokeStyle = getUiColor('playhead');
            tourGraphCtx.setLineDash([4, 4]);
            tourGraphCtx.beginPath();
            tourGraphCtx.moveTo(currentX, rect.y);
            tourGraphCtx.lineTo(currentX, rect.y + rect.height);
            tourGraphCtx.stroke();
            tourGraphCtx.setLineDash([]);

            tourGraphCtx.textAlign = 'left';
            tourGraphCtx.textBaseline = 'top';
            tourGraphCtx.fillStyle = getUiColor('coherenceLine');
            tourGraphCtx.fillText(`coherence ${currentCoherence.toFixed(3)}`, rect.x + 8, rect.y + 8);
            tourGraphCtx.fillStyle = getUiColor('tourWeightLine');
            tourGraphCtx.fillText(`tour weight ${currentTourWeight.toFixed(3)}`, rect.x + 8, rect.y + 23);

            drawResonanceCategoryGraphs(windowStart);
        }

        function formatTourControlValue(value) {
            const numericValue = Number(value);
            if (Math.abs(numericValue) > 0 && Math.abs(numericValue) < 0.01) {
                return numericValue.toFixed(4);
            }
            if (Math.abs(numericValue) < 0.1) {
                return numericValue.toFixed(3);
            }
            return numericValue.toFixed(2);
        }

        function getPrecisionForRange(range) {
            if (range <= 0.35) return 5;
            if (range <= 1) return 4;
            if (range <= 3) return 3;
            return 2;
        }

        function formatGraphPValue(P) {
            return P.toFixed(getPrecisionForRange(tourRemap.range));
        }

        function getValueDisplayDecimals() {
            if (isTourMode) {
                return getPrecisionForRange(tourRemap.range);
            }

            if (step === 0.01) return 2;
            if (step === 0.001) return 3;
            if (step === 0.0001) return 4;
            if (step === 0.00001) return 5;
            if (step === 0.000001) return 6;
            return 1;
        }

        function getGraphSamplePs(windowStart) {
            const points = [];

            for (let i = 0; i < TOUR_GRAPH_DRAW_SAMPLES; i++) {
                const t = i / (TOUR_GRAPH_DRAW_SAMPLES - 1);
                points.push(windowStart + t * tourRemap.range);
            }

            points.push(numPetals);
            return points
                .sort((a, b) => a - b)
                .filter((P, index, sorted) => index === 0 || Math.abs(P - sorted[index - 1]) > 1e-10);
        }

        function syncTourRemapControls() {
            if (tourRemap.white <= tourRemap.black + 0.01) {
                tourRemap.white = Math.min(1, tourRemap.black + 0.01);
                if (tourRemap.white <= tourRemap.black) {
                    tourRemap.black = Math.max(0, tourRemap.white - 0.01);
                }
            }

            tourRangeInput.value = tourRemap.range;
            tourBlackInput.value = tourRemap.black;
            tourWhiteInput.value = tourRemap.white;
            tourGammaInput.value = tourRemap.gamma;
            tourSmoothingInput.value = tourRemap.smoothing;
            tourInputGainInput.value = tourRemap.input;
            tourOutputGainInput.value = tourRemap.output;
            tourLiftInput.value = tourRemap.lift;
            tourMultiplyInput.value = tourRemap.multiply;
            tourOffsetInput.value = tourRemap.offset;

            tourRangeOutput.textContent = formatTourControlValue(tourRemap.range);
            tourBlackOutput.textContent = formatTourControlValue(tourRemap.black);
            tourWhiteOutput.textContent = formatTourControlValue(tourRemap.white);
            tourGammaOutput.textContent = formatTourControlValue(tourRemap.gamma);
            tourSmoothingOutput.textContent = Math.round(tourRemap.smoothing);
            tourInputGainOutput.textContent = formatTourControlValue(tourRemap.input);
            tourOutputGainOutput.textContent = formatTourControlValue(tourRemap.output);
            tourLiftOutput.textContent = formatTourControlValue(tourRemap.lift);
            tourMultiplyOutput.textContent = formatTourControlValue(tourRemap.multiply);
            tourOffsetOutput.textContent = formatTourControlValue(tourRemap.offset);

            valueDisplay.textContent = numPetals.toFixed(getValueDisplayDecimals());
            drawTourGraph();
        }

        function syncCoherenceMultiplierControls() {
            coherenceAngularMultiplierInput.value = coherenceTypeMultipliers.angular;
            coherenceRationalMultiplierInput.value = coherenceTypeMultipliers.rational;

            coherenceAngularMultiplierOutput.textContent = formatTourControlValue(coherenceTypeMultipliers.angular);
            coherenceRationalMultiplierOutput.textContent = formatTourControlValue(coherenceTypeMultipliers.rational);

            draw(numPetals);
        }

        function updateCoherenceMultiplierFromControl(input) {
            const value = Number(input.value);

            if (input === coherenceAngularMultiplierInput) {
                coherenceTypeMultipliers.angular = value;
            } else if (input === coherenceRationalMultiplierInput) {
                coherenceTypeMultipliers.rational = value;
            }

            syncCoherenceMultiplierControls();
        }

        function updateTourRemapFromControl(input) {
            const value = Number(input.value);

            if (input === tourRangeInput) {
                tourRemap.range = value;
            } else if (input === tourBlackInput) {
                tourRemap.black = Math.min(value, tourRemap.white - 0.01);
            } else if (input === tourWhiteInput) {
                tourRemap.white = Math.max(value, tourRemap.black + 0.01);
            } else if (input === tourGammaInput) {
                tourRemap.gamma = value;
            } else if (input === tourSmoothingInput) {
                tourRemap.smoothing = value;
            } else if (input === tourInputGainInput) {
                tourRemap.input = value;
            } else if (input === tourOutputGainInput) {
                tourRemap.output = value;
            } else if (input === tourLiftInput) {
                tourRemap.lift = value;
            } else if (input === tourMultiplyInput) {
                tourRemap.multiply = value;
            } else if (input === tourOffsetInput) {
                tourRemap.offset = value;
            }

            syncTourRemapControls();
        }
        
        let currentParticles = [];
        
        const dpr = window.devicePixelRatio || 1;
        let size;
        
        function resizeCanvas() {
            size = Math.min(window.innerWidth * 0.5, window.innerHeight * 0.45, 320);
            canvas.width = size * dpr;
            canvas.height = size * dpr;
            canvas.style.width = size + 'px';
            canvas.style.height = size + 'px';
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(dpr, dpr);
            draw(numPetals);
        }
        
        const TOTAL_PARTICLES = 1000;
        const GOLDEN_ANGLE = Math.PI * (3 - Math.sqrt(5));
        
        function getColor(petalShape, birthIndex) {
            if (isBlackWhiteScheme) {
                const t = colorByBirthOrder
                    ? birthIndex / (TOTAL_PARTICLES - 1)
                    : (petalShape - 0.2) / 0.8;
                const value = colorByBirthOrder
                    ? Math.round(30 + clamp01(t) * 150)
                    : Math.round(225 - clamp01(t) * 205);
                return `rgb(${value}, ${value}, ${value})`;
            }

            if (colorByBirthOrder) {
                // Blue to red gradient based on birth order (0-999)
                const t = birthIndex / TOTAL_PARTICLES;
                const r = Math.round(t * 255);
                const g = 0;
                const b = Math.round((1 - t) * 255);
                return `rgb(${r}, ${g}, ${b})`;
            } else {
                // Original petalShape-based color
                const t = (petalShape - 0.2) / 0.8;
                const r = Math.round(20 + t * (244 - 20));
                const g = Math.round(50 + t * (208 - 50));
                const b = Math.round(90 + t * (63 - 90));
                return `rgb(${r}, ${g}, ${b})`;
            }
        }

        function drawVisualizationBackground(center) {
            if (isBlackWhiteScheme) {
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, size, size);
                return;
            }

            const gradient = ctx.createRadialGradient(center, center, 0, center, center, size * 0.52);
            gradient.addColorStop(0, '#12121f');
            gradient.addColorStop(0.7, '#0a0a12');
            gradient.addColorStop(1, '#0a0a12');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);
        }
        
        function draw(numPetals) {
            const maxRadius = size * 0.45;
            const center = size / 2;
            
            ctx.clearRect(0, 0, size, size);
            drawVisualizationBackground(center);
            
            const particles = [];
            
            for (let i = 0; i < TOTAL_PARTICLES; i++) {
                const theta = i * GOLDEN_ANGLE;
                const baseRadius = Math.sqrt(i / TOTAL_PARTICLES) * maxRadius;
                
                const petalAngle = theta * numPetals;
                const sinVal = Math.sin(petalAngle / 2);
                const petalShape = Math.pow(Math.abs(sinVal), 8) * 0.8 + 0.2;
                
                const finalRadius = baseRadius * petalShape;
                
                const x = center + finalRadius * Math.cos(theta);
                const y = center + finalRadius * Math.sin(theta);
                
                particles.push({
                    i,
                    x,
                    y,
                    r: finalRadius,
                    angle: theta % (2 * Math.PI),
                    petalShape
                });
                
                const particleSize = 2 + petalShape * 2;
                ctx.beginPath();
                ctx.arc(x, y, particleSize, 0, Math.PI * 2);
                ctx.fillStyle = getColor(petalShape, i);
                ctx.fill();
                
                if (petalShape > 0.7) {
                    ctx.beginPath();
                    ctx.arc(x, y, particleSize * 2, 0, Math.PI * 2);
                    const alpha = (petalShape - 0.7) * 0.5;
                    ctx.fillStyle = `${getUiColor('particleGlow')}${alpha})`;
                    ctx.fill();
                }
            }
            
            const displayCoherence = analyzeCoherence(numPetals);
            
            structureIndicator.className = 'structure-indicator ' + displayCoherence.type;
            structureIndicator.textContent = displayCoherence.label;
            formulaDisplay.textContent = displayCoherence.formula;
            
            // Calculate label opacity
            let labelOpacity;
            if (displayCoherence.type === 'unclear') {
                // No coherence - fade out
                labelOpacity = 0;
            } else if (isTourMode) {
                // In tour mode, fade based on the editable tour weight
                // This syncs with the slowdown - labels fade in as we slow down
                const strength = getTourWeight(numPetals);
                // strength 1 = opacity 1, strength ~0.37 = opacity ~0.5
                labelOpacity = Math.max(0.1, strength);
            } else {
                // Not in tour mode - instant on when coherent
                labelOpacity = 1;
            }

            if (isBlackWhiteScheme && displayCoherence.type !== 'unclear') {
                labelOpacity = Math.max(0.75, labelOpacity);
            }
            
            structureIndicator.style.opacity = labelOpacity;
            formulaDisplay.style.opacity = labelOpacity;

            if (!tourResponsePanel.hidden) {
                drawTourGraph();
            }
            
            currentParticles = particles;
        }
        
        function updateValue(delta) {
            numPetals = numPetals + delta;
            valueDisplay.textContent = numPetals.toFixed(getValueDisplayDecimals());
            draw(numPetals);
        }
        
        function getX(e) {
            if (e.touches && e.touches.length > 0) {
                return e.touches[0].clientX;
            }
            return e.clientX;
        }
        
        function startDrag(e) {
            if (e.target.closest('button, input, label, .tour-response-panel')) return;
            
            if (isPlaying) {
                togglePlay();
            }
            
            isDragging = true;
            lastX = getX(e);
            dragIndicator.classList.add('active');
            e.preventDefault();
        }
        
        function moveDrag(e) {
            if (!isDragging) return;
            
            const currentX = getX(e);
            const deltaX = currentX - lastX;
            
            const sensitivity = 5;
            const steps = deltaX / sensitivity;
            
            if (Math.abs(steps) >= 1) {
                const wholeSteps = Math.trunc(steps);
                updateValue(wholeSteps * step);
                lastX = currentX - (steps - wholeSteps) * sensitivity;
            }
            
            e.preventDefault();
        }
        
        function endDrag(e) {
            isDragging = false;
            dragIndicator.classList.remove('active');
        }
        
        document.addEventListener('mousedown', startDrag);
        document.addEventListener('mousemove', moveDrag);
        document.addEventListener('mouseup', endDrag);
        document.addEventListener('mouseleave', endDrag);
        
        document.addEventListener('touchstart', startDrag, { passive: false });
        document.addEventListener('touchmove', moveDrag, { passive: false });
        document.addEventListener('touchend', endDrag);
        document.addEventListener('touchcancel', endDrag);
        
        granularityBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                granularityBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                step = parseFloat(btn.dataset.step);
                valueDisplay.textContent = numPetals.toFixed(getValueDisplayDecimals());
            });
            
            btn.addEventListener('touchstart', (e) => e.stopPropagation());
        });
        
        document.addEventListener('contextmenu', (e) => e.preventDefault());
        
        function animate(currentTime) {
            if (!isPlaying) return;
            
            if (currentTime - lastFrameTime >= FRAME_INTERVAL) {
                lastFrameTime = currentTime;
                
                let currentStep;
                
                if (isTourMode) {
                    // Tour mode: speed varies based on coherence field strength
                    currentStep = getTourSpeed(numPetals);
                } else {
                    // Normal mode: constant speed
                    currentStep = step;
                }
                
                numPetals += currentStep;
                
                valueDisplay.textContent = numPetals.toFixed(getValueDisplayDecimals());
                draw(numPetals);
            }
            
            animationId = requestAnimationFrame(animate);
        }
        
        function togglePlay() {
            isPlaying = !isPlaying;
            playBtn.classList.toggle('playing', isPlaying);
            
            if (isPlaying) {
                lastFrameTime = performance.now();
                animationId = requestAnimationFrame(animate);
            } else if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
        }
        
        playBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            togglePlay();
        });
        
        playBtn.addEventListener('touchstart', (e) => e.stopPropagation());
        
        tourBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            isTourMode = !isTourMode;
            tourBtn.classList.toggle('active', isTourMode);
            
            // Reset speed tracking when starting tour
            if (isTourMode) {
                lastTourSpeed = TOUR_CRUISE_SPEED;
            }
            
            // Auto-start playback if not already playing
            if (isTourMode && !isPlaying) {
                togglePlay();
            }
        });
        
        tourBtn.addEventListener('touchstart', (e) => e.stopPropagation());
        
        colorBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            colorByBirthOrder = !colorByBirthOrder;
            colorBtn.classList.toggle('active', colorByBirthOrder);
            draw(numPetals);
        });
        
        colorBtn.addEventListener('touchstart', (e) => e.stopPropagation());

        function syncColorScheme() {
            document.body.classList.toggle('bw-scheme', isBlackWhiteScheme);
            schemeBtn.classList.toggle('active', isBlackWhiteScheme);

            if (isBlackWhiteScheme) {
                canvas.style.background = '#ffffff';
                canvas.style.borderRadius = '0';
                canvas.style.boxShadow = 'none';
            } else {
                canvas.style.background = 'radial-gradient(ellipse at center, var(--bg-surface) 0%, var(--bg-deep) 70%)';
                canvas.style.borderRadius = '50%';
                canvas.style.boxShadow = '0 0 40px var(--glow-blue), inset 0 0 60px rgba(0, 0, 0, 0.5)';
            }

            draw(numPetals);
        }

        schemeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            isBlackWhiteScheme = !isBlackWhiteScheme;
            syncColorScheme();
        });

        schemeBtn.addEventListener('touchstart', (e) => e.stopPropagation());

        tourSettingsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const isHidden = tourResponsePanel.hidden;
            tourResponsePanel.hidden = !isHidden;
            tourSettingsBtn.classList.toggle('active', isHidden);
            tourSettingsBtn.setAttribute('aria-expanded', String(isHidden));
            if (isHidden) {
                resizeTourGraph();
            }
        });

        tourSettingsBtn.addEventListener('touchstart', (e) => e.stopPropagation());

        [
            coherenceAngularMultiplierInput,
            coherenceRationalMultiplierInput,
        ].forEach((input) => {
            input.addEventListener('input', (e) => {
                e.stopPropagation();
                updateCoherenceMultiplierFromControl(input);
            });
        });

        [
            tourRangeInput,
            tourBlackInput,
            tourWhiteInput,
            tourGammaInput,
            tourSmoothingInput,
            tourInputGainInput,
            tourOutputGainInput,
            tourLiftInput,
            tourMultiplyInput,
            tourOffsetInput,
        ].forEach((input) => {
            input.addEventListener('input', (e) => {
                e.stopPropagation();
                updateTourRemapFromControl(input);
            });
        });
        
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('resize', () => {
            if (!tourResponsePanel.hidden) {
                resizeTourGraph();
            }
        });
        
        // Particle hover detection
        const tooltip = document.getElementById('particleTooltip');
        const canvasContainer = document.querySelector('.canvas-container');
        
        canvasContainer.style.pointerEvents = 'auto';
        
        canvasContainer.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = (e.clientX - rect.left) * (canvas.width / dpr / rect.width);
            const mouseY = (e.clientY - rect.top) * (canvas.height / dpr / rect.height);
            
            let nearestParticle = null;
            let nearestDist = Infinity;
            
            for (const p of currentParticles) {
                const dx = p.x - mouseX;
                const dy = p.y - mouseY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const particleSize = 2 + p.petalShape * 2;
                
                if (dist < particleSize * 1.5 && dist < nearestDist) {
                    nearestDist = dist;
                    nearestParticle = p;
                }
            }
            
            if (nearestParticle) {
                tooltip.textContent = `ID: ${nearestParticle.i}`;
                tooltip.style.left = (e.clientX + 15) + 'px';
                tooltip.style.top = (e.clientY - 10) + 'px';
                tooltip.classList.add('visible');
            } else {
                tooltip.classList.remove('visible');
            }
        });
        
        canvasContainer.addEventListener('mouseleave', () => {
            tooltip.classList.remove('visible');
        });
        
        // Initial setup
        syncTourRemapControls();
        playBtn.classList.add('playing');
        tourBtn.classList.add('active');
        lastFrameTime = performance.now();
        animationId = requestAnimationFrame(animate);
        resizeCanvas();
        syncCoherenceMultiplierControls();
    </script>
</body>
</html>
